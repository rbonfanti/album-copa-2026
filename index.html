<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Álbum Copa 2026 — Controle de Figurinhas</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#fff; --ink:#1c1f24; --muted:#6b7280; --line:#e5e7eb;
    --falta:#cbd2d9; --tenho:#16a34a; --tenho-bg:#ecfdf3; --dupe:#d97706; --dupe-bg:#fffbeb;
    --accent:#0f62fe; --accent-bg:#eef4ff; --shadow:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:16px; line-height:1.4;
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* ===== Cabeçalho fixo ===== */
  header{
    position:sticky; top:0; z-index:20; background:rgba(244,245,247,.92);
    backdrop-filter:saturate(180%) blur(8px); border-bottom:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-top)); padding-top:max(10px,env(safe-area-inset-top));
  }
  .titlebar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .titlebar h1{font-size:16px;font-weight:700;margin:0;letter-spacing:-.01em}
  .titlebar .sub{font-size:11px;color:var(--muted);font-weight:500}
  .backup-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .btn{
    font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--card);
    color:var(--ink);padding:7px 10px;border-radius:9px;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow)
  }
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.sh-rep{background:var(--dupe);border-color:var(--dupe);color:#fff}
  .btn.sh-falt{background:#dc2626;border-color:#dc2626;color:#fff}
  /* tabs */
  .tabs{display:flex;gap:6px;margin-bottom:8px}
  .tab{
    flex:1;text-align:center;font-size:13px;font-weight:600;padding:9px 6px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;box-shadow:var(--shadow)
  }
  .tab.active{color:#fff}
  .tab[data-view="tudo"].active{background:#0f62fe;border-color:#0f62fe}
  .tab[data-view="faltam"].active{background:#dc2626;border-color:#dc2626}
  .tab[data-view="repetidas"].active{background:#d97706;border-color:#d97706}
  .tab .cnt{display:block;font-size:11px;font-weight:800;margin-top:1px}
  .tab[data-view="tudo"] .cnt{color:#0f62fe}
  .tab[data-view="faltam"] .cnt{color:#dc2626}
  .tab[data-view="repetidas"] .cnt{color:#d97706}
  .tab.active .cnt{color:#fff;opacity:.92}
  /* busca */
  .search{position:relative}
  .search input{
    width:100%;font:inherit;font-size:15px;padding:11px 36px 11px 14px;border-radius:11px;
    border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow)
  }
  .search .clear{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:transparent;
    font-size:18px;color:var(--muted);cursor:pointer;padding:6px;display:none
  }
  .search.has-value .clear{display:block}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}
  /* barra de progresso */
  .progress{display:flex;align-items:center;gap:10px;margin-top:9px}
  .bar{flex:1;height:7px;border-radius:5px;background:var(--line);overflow:hidden}
  .bar i{display:block;height:100%;background:var(--tenho);width:0%}
  .progress .pct{font-size:12px;font-weight:700;color:var(--tenho);min-width:38px;text-align:right}

  /* ===== Conteúdo ===== */
  main{padding:12px 14px 60px;max-width:1100px;margin:0 auto}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px}
  .empty .big{font-size:34px;margin-bottom:8px}

  section.team{margin-bottom:18px}
  .team-head{
    display:flex;align-items:baseline;gap:8px;position:sticky;top:0;z-index:5;
    padding:8px 2px;margin-bottom:4px;background:linear-gradient(var(--bg),var(--bg) 70%,transparent)
  }
  .team-head .code{
    font-size:12px;font-weight:800;letter-spacing:.04em;background:var(--ink);color:#fff;
    padding:3px 7px;border-radius:6px
  }
  .team-head .name{font-size:15px;font-weight:700}
  .team-head .grp{font-size:11px;color:var(--muted);font-weight:600}
  .team-head .tcnt{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}

  .grid{display:grid;grid-template-columns:1fr;gap:7px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}

  .card{
    display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);
    border-left:5px solid var(--falta);border-radius:11px;padding:9px 10px;cursor:pointer;
    box-shadow:var(--shadow);transition:border-color .12s,background .12s;user-select:none
  }
  .card:active{transform:scale(.995)}
  .card.have{border-left-color:var(--tenho);background:var(--tenho-bg)}
  .card.dupe{border-left-color:var(--dupe);background:var(--dupe-bg)}
  .card .num{
    flex:none;width:34px;height:34px;border-radius:9px;background:var(--bg);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--ink)
  }
  .card.have .num{background:var(--tenho);border-color:var(--tenho);color:#fff}
  .card.dupe .num{background:var(--dupe);border-color:var(--dupe);color:#fff}
  .card .info{flex:1;min-width:0}
  .card .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .mt{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
  .card .typeicon{font-size:11px}
  /* não convocado (erro Panini) — visual "desabilitado" */
  .card.naoconv{background:#dfe3e8;border-color:#cbd2d9}
  .card.naoconv .nm{color:#6b7280;text-decoration:line-through;text-decoration-thickness:1px}
  .card.naoconv .num{background:#9ca3af;border-color:#9ca3af;color:#eef0f2}
  /* substituto (pacote de atualização) */
  .card.subst{border-left-color:#7c3aed;background:#f5f3ff}
  .card.subst .num{background:#7c3aed;border-color:#7c3aed;color:#fff}
  .pill{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.02em;padding:2px 6px;
    border-radius:6px;vertical-align:middle;margin-left:5px;text-transform:uppercase;white-space:nowrap}
  .pill.fora{background:#9ca3af;color:#fff}
  .pill.sub{background:#7c3aed;color:#fff}
  /* controles repetidas */
  .stepper{flex:none;display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--card)}
  .stepper button{
    width:32px;height:32px;border:none;background:transparent;font-size:18px;font-weight:700;
    color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center
  }
  .stepper button:active{background:var(--bg)}
  .stepper .dval{min-width:30px;text-align:center;font-weight:800;font-size:14px;color:var(--dupe)}
  .stepper .dval.zero{color:var(--muted);font-weight:600}
  .rep-label{font-size:9px;color:var(--muted);text-align:center;margin-top:2px;line-height:1}
  .stepwrap{flex:none;display:flex;flex-direction:column;align-items:center}

  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25)
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin:2px 2px 14px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
</style>
</head>

<header>
  <div class="titlebar">
    <div>
      <h1>⚽ Álbum Copa 2026</h1>

  </div>

    <div class="bar"><i id="progBar"></i></div>
    <div class="pct" id="progPct">0%</div>
  </div>
</header>

<main id="app"></main>
<div class="toast" id="toast"></div>

/* ===== Expansão: TEAMS -> figurinhas (escudo + jogadores + foto), slots 1..20 ===== */
const TYPE_ICON = {escudo:"🛡️", jogador:"👤", foto:"📸", especial:"⭐", metalizada:"✨", museu:"🏆", substituto:"🔁"};

function buildStickers(){
  const sections = [];
  // Seção especiais primeiro (abertura do álbum)
  sections.push({key:"ESP", code:"ESP", name:"Especiais / Abertura", group:"–", stickers: SPECIALS.map(s=>({...s, sectionKey:"ESP"}))});

  TEAMS.forEach(t=>{
    const fora = new Set(FORA[t.code]||[]);
    const main = [];
    // slot 1 = escudo
    main.push({id:t.code+"-1", code:t.code, num:1, type:"escudo", nm:"Escudo — "+t.name, mt:t.code+" · Escudo", sectionKey:t.code});
    // 18 jogadores: índices 0–10 -> slots 2–12 ; índices 11–17 -> slots 14–20 (a foto fica no 13)
    t.players.forEach((p,i)=>{
      const slot = i<11 ? i+2 : i+3;
      main.push({id:t.code+"-"+slot, code:t.code, num:slot, type:"jogador", nm:p, mt:t.code+" · Jogador", sectionKey:t.code, fora:fora.has(i)});
    });
    // slot 13 = foto do time
    main.push({id:t.code+"-13", code:t.code, num:13, type:"foto", nm:"Foto do time — "+t.name, mt:t.code+" · Seleção", sectionKey:t.code});
    main.sort((a,b)=>a.num-b.num);

    // substitutos (pacote de atualização) -> figurinhas extras ao final da seleção
    const subs = (SUBS[t.code]||[]).map((s,i)=>({
      id:t.code+"-S"+(i+1), code:t.code, num:"S"+(i+1), type:"substituto",
      nm:s, mt:t.code+" · Atualização (substituto)", sectionKey:t.code, sub:true
    }));

    sections.push({key:t.code, code:t.code, name:t.name, group:t.group, stickers: main.concat(subs)});
  });
  return sections;
}
const SECTIONS = buildStickers();
const ALL_STICKERS = SECTIONS.flatMap(s=>s.stickers);
const TOTAL = ALL_STICKERS.length;

/* ===================== ESTADO + PERSISTÊNCIA ===================== */
const LS_KEY = "copa2026_v1";
let state = loadState();         // { id: {h:bool, d:int} }  (só guarda não-default)

function loadState(){
  try{ const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ toast("⚠️ Falha ao salvar — faça um backup!"); }
}
function getS(id){ return state[id] || {h:false,d:0}; }
function setS(id, h, d){
  if(!h && (!d||d<=0)){ delete state[id]; } else { state[id] = {h:h, d:Math.max(0,d|0)}; }
  saveState();
}

/* ===================== RENDER ===================== */
let view = "faltam";
let query = "";

const app = document.getElementById("app");

function tokens(q){ return q.toLowerCase().trim().split(/\s+/).filter(Boolean); }
function matches(st, sec, toks){
  if(!toks.length) return true;
  const hay = [st.nm, st.code, sec.name, "grupo "+sec.group, String(st.num)].join(" ").toLowerCase();
  // cada token precisa bater em algo (AND) — permite "bra 13"
  return toks.every(tk=>{
    if(/^\d+$/.test(tk)) return String(st.num)===tk || hay.includes(tk);
    return hay.includes(tk);
  });
}
function inView(st){
  const s = getS(st.id);
  if(view==="faltam")    return !s.h;
  if(view==="repetidas") return s.d>0;
  return true; // tudo
}

function render(){
  const toks = tokens(query);
  let html = "";
  let shown = 0;

  SECTIONS.forEach(sec=>{
    const list = sec.stickers.filter(st => inView(st) && matches(st, sec, toks));
    if(!list.length) return;
    shown += list.length;

    const total = sec.stickers.length;
    let subcount;
    if(view==="faltam")      subcount = `faltam ${list.length}`;
    else if(view==="repetidas") subcount = `${list.reduce((a,st)=>a+getS(st.id).d,0)} repetidas`;
    else {
      const have = sec.stickers.filter(st=>getS(st.id).h).length;
      subcount = `${have}/${total}`;
    }

    html += `<section class="team">
      <div class="team-head">
        <span class="code">${sec.code}</span>
        <span class="name">${sec.name}</span>
        ${sec.group!=="–" ? `<span class="grp">Grupo ${sec.group}</span>`:""}
        <span class="tcnt">${subcount}</span>
      </div>
      <div class="grid">`;

    list.forEach(st=>{
      const s = getS(st.id);
      let cls = s.d>0 ? "dupe" : (s.h ? "have" : "");
      if(st.fora) cls += " naoconv";
      if(st.sub)  cls += " subst";
      const numTxt = st.type==="substituto" ? st.num : (st.sectionKey==="ESP" ? (st.num||"★") : st.num);
      const tag = st.fora ? `<span class="pill fora">não convocado</span>`
                : st.sub  ? `<span class="pill sub">substituto</span>` : "";
      html += `<div class="card ${cls}" data-id="${st.id}">
        <div class="num">${numTxt}</div>
        <div class="info">
          <div class="nm">${st.nm}${tag}</div>
          <div class="mt"><span class="typeicon">${TYPE_ICON[st.type]||""}</span> ${st.mt}</div>
        </div>
        <div class="stepwrap">
          <div class="stepper">
            <button data-act="dec" data-id="${st.id}" aria-label="menos repetida">−</button>
            <span class="dval ${s.d>0?'':'zero'}">${s.d}</span>
            <button data-act="inc" data-id="${st.id}" aria-label="mais repetida">+</button>
          </div>
          <div class="rep-label">repetidas</div>
        </div>
      </div>`;
    });
    html += `</div></section>`;
  });

  if(!shown){
    const msg = view==="faltam" ? (query?"Nada falta com esse filtro 🎉":"Você não tem nenhuma faltante 🎉")
              : view==="repetidas" ? (query?"Nenhuma repetida com esse filtro":"Sem repetidas marcadas ainda")
              : "Nada encontrado com esse filtro";
    html = `<div class="empty"><div class="big">🔎</div>${msg}</div>`;
  }
  app.innerHTML = html;
  updateCounters();
}

function updateCounters(){
  let falta=0, dup=0, baseHave=0, baseTotal=0;
  ALL_STICKERS.forEach(st=>{
    const s=getS(st.id);
    if(!s.h) falta++;
    dup+=s.d;
    if(!st.sub){ baseTotal++; if(s.h) baseHave++; } // % de conclusão só do álbum-base (980)
  });
  document.getElementById("cnt-faltam").textContent = falta;
  document.getElementById("cnt-repetidas").textContent = dup;
  document.getElementById("cnt-tudo").textContent = TOTAL;
  const pct = Math.round(baseHave/baseTotal*100);
  document.getElementById("progBar").style.width = pct+"%";
  document.getElementById("progPct").textContent = pct+"%";
}

/* ===================== INTERAÇÃO ===================== */
let pendingRender = null;
function softRender(){ // re-render sem perder posição de scroll
  const y = window.scrollY;
  render();
  window.scrollTo(0,y);
}

app.addEventListener("click", e=>{
  const stepBtn = e.target.closest("[data-act]");
  if(stepBtn){
    e.stopPropagation();
    const id = stepBtn.dataset.id, act = stepBtn.dataset.act;
    const s = getS(id);
    let d = s.d, h = s.h;
    if(act==="inc"){ d++; h=true; }            // repetida implica que você tem
    else if(act==="dec"){ d=Math.max(0,d-1); } // não mexe no "tenho"
    setS(id, h, d);
    softRender();
    return;
  }
  const card = e.target.closest(".card");
  if(card){
    const id = card.dataset.id;
    const s = getS(id);
    // toggle TENHO/FALTA. Se tinha repetidas e está zerando, mantém repetidas? não:
    // zerar "tenho" zera repetidas (você não tem mais nenhuma).
    if(s.h){ setS(id, false, 0); }
    else { setS(id, true, s.d); }
    softRender();
  }
});

/* tabs */
document.getElementById("tabs").addEventListener("click", e=>{
  const tab = e.target.closest(".tab"); if(!tab) return;
  view = tab.dataset.view;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t===tab));
  window.scrollTo(0,0);
  render();
});

/* busca */
const searchInput = document.getElementById("search");
const searchWrap = document.getElementById("searchWrap");
searchInput.addEventListener("input", ()=>{
  query = searchInput.value;

/* ===================== COMPARTILHAR (snapshot só-leitura) =====================
   Gera um HTML estático (já "pré-renderizado" por construção) com as marcações
   atuais embutidas. Abre em qualquer preview (WhatsApp/iOS) e é SÓ LEITURA —
   não grava nada no aparelho de quem recebe. Resolve mostrar repetidas/faltantes
   sem bagunçar a coleção do outro. */
const OWNER_KEY="copa2026_owner";
function getOwnerName(){
  let n=localStorage.getItem(OWNER_KEY);
  if(!n){
    n=(prompt("Seu nome (aparece pra quem receber a lista):","")||"").trim();
    if(n) localStorage.setItem(OWNER_KEY,n);
  }
  return n||"Minha coleção";
}
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pad=n=>String(n).padStart(2,"0");

function buildSnapshot(kind){
  const isRep = kind==="repetidas";
  const owner = getOwnerName();
  const d=new Date(); const dt=pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();
  let total=0, body="";
  SECTIONS.forEach(sec=>{
    const items=sec.stickers.filter(st=>{const s=getS(st.id); return isRep? s.d>0 : !s.h;});
    if(!items.length) return;
    let rows="";
    items.forEach(st=>{
      const s=getS(st.id);
      const numTxt= st.type==="substituto"? st.num : (st.sectionKey==="ESP"?(st.num||"★"):st.num);
      const q= isRep? '<span class="q">×'+s.d+'</span>' : '';
      const sb= st.sub? ' <span class="sb">sub</span>' : '';
      rows+='<div class="it"><span class="n">'+esc(numTxt)+'</span><span class="nm">'+esc(st.nm)+sb+'</span>'+q+'</div>';
      total+= isRep? s.d : 1;
    });
    body+='<section><h2><span class="cd">'+esc(sec.code)+'</span> '+esc(sec.name)+' <span class="tc">'+items.length+'</span></h2><div class="grid">'+rows+'</div></section>';
  });
  if(!body) body='<p class="empty">Nada marcado aqui ainda.</p>';
  const titulo= isRep? "Repetidas — tenho pra trocar" : "Faltantes — preciso";
  const accent= isRep? "#d97706" : "#dc2626";
  const css="*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#f4f5f7;color:#1c1f24;font-size:16px;line-height:1.4;padding-bottom:40px}"
   +"header{background:"+accent+";color:#fff;padding:16px 14px;position:sticky;top:0}.ttl{font-size:18px;font-weight:800}.own{font-size:13px;opacity:.95;margin-top:2px;font-weight:600}.ro{font-size:11px;opacity:.95;margin-top:8px;background:rgba(255,255,255,.2);padding:6px 9px;border-radius:8px}.tot{font-size:12px;font-weight:700;margin-top:8px}"
   +"main{max-width:900px;margin:0 auto;padding:12px 14px}section{margin-bottom:16px}h2{font-size:14px;font-weight:700;padding:8px 2px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #e5e7eb;margin-bottom:6px}.cd{background:#1c1f24;color:#fff;font-size:11px;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:.04em}.tc{margin-left:auto;font-size:12px;color:#6b7280;font-weight:700}"
   +".grid{display:grid;grid-template-columns:1fr;gap:5px}@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}@media(min-width:880px){.grid{grid-template-columns:1fr 1fr 1fr}}"
   +".it{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e7eb;border-left:4px solid "+accent+";border-radius:9px;padding:7px 10px}.n{flex:none;min-width:30px;height:28px;padding:0 6px;border-radius:7px;background:"+accent+";color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}.nm{flex:1;font-weight:600;font-size:14px}.q{flex:none;font-weight:800;color:"+accent+";font-size:16px}.sb{font-size:9px;font-weight:800;background:#7c3aed;color:#fff;padding:1px 5px;border-radius:5px;text-transform:uppercase}"
   +".empty{color:#6b7280;text-align:center;padding:40px}footer{text-align:center;color:#9ca3af;font-size:11px;margin-top:20px}";
  return '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+esc(titulo)+" — "+esc(owner)+'</title><style>'+css+'</style></head><body>'
   +'<header><div class="ttl">⚽ '+esc(titulo)+'</div><div class="own">'+esc(owner)+' · '+dt+'</div><div class="ro">📖 Modo leitura — esta é a lista de '+esc(owner)+'. Abrir aqui não altera a sua coleção.</div><div class="tot">'+total+' '+(isRep?"repetidas":"faltantes")+'</div></header>'
   +'<main>'+body+'</main>'
   +'<footer>Álbum Copa 2026 · lista gerada para troca em '+dt+'</footer></body></html>';
}

async function shareSnapshot(kind){
  const html=buildSnapshot(kind);
  const slug=(localStorage.getItem(OWNER_KEY)||"colecao").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"colecao";
  const fname=(kind==="repetidas"?"repetidas":"faltantes")+"-"+slug+".html";
  try{
    const file=new File([html],fname,{type:"text/html"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:fname});
      return;
    }
  }catch(e){ if(e && e.name==="AbortError") return; }
  const url=URL.createObjectURL(new Blob([html],{type:"text/html"}));
  const a=document.createElement("a"); a.href=url; a.download=fname; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  toast("📤 Arquivo gerado — envie pelo WhatsApp");
}
document.getElementById("btnShareRep").addEventListener("click", ()=>shareSnapshot("repetidas"));
document.getElementById("btnShareFalt").addEventListener("click", ()=>shareSnapshot("faltantes"));

/* ===================== BACKUP / RESTAURAR ===================== */
document.getElementById("btnExport").addEventListener("click", ()=>{
  const payload = { app:"album-copa-2026", version:1, savedAt:new Date().toISOString(), state };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const stamp = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")
              +"_"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0");
  a.href=url; a.download="copa2026-backup_"+stamp+".json"; a.click();
  URL.revokeObjectURL(url);
  toast("✅ Backup baixado");
});

document.getElementById("btnImport").addEventListener("click", ()=> document.getElementById("fileImport").click());
document.getElementById("fileImport").addEventListener("change", e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      const incoming = data.state || data; // aceita formato cru também
      if(typeof incoming!=="object") throw new Error("formato");
      if(!confirm("Restaurar este backup vai SUBSTITUIR o progresso atual neste aparelho. Continuar?")) return;
      state = incoming; saveState(); render();
      toast("✅ Backup restaurado");
    }catch(err){ toast("⚠️ Arquivo inválido"); }
    e.target.value="";
  };
  reader.readAsText(file);
});

/* ===================== TOAST ===================== */
let toastTimer=null;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}
